<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piko - Creative Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth hover transitions for the cards */
        .card {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Efek saat di-hover: kotak sedikit membesar dan naik ke atas tumpukan */
        .card:hover {
            transform: translateY(-10px) scale(1.05) !important;
            z-index: 100 !important;
        }
    </style>
</head>
<body class="bg-white text-gray-900 font-sans antialiased overflow-x-hidden selection:bg-gray-200">

    <div class="min-h-screen flex flex-col justify-between items-center pt-20 sm:pt-32">
        
        <div class="text-center max-w-lg px-6 flex flex-col items-center">
            <h1 class="text-2xl sm:text-3xl font-semibold mb-3">Hi! I am Piko 👋</h1>
            <p class="text-[15px] sm:text-base text-gray-800 leading-relaxed mb-6">
                a creative designer ✏️ based in Jakarta 🌲. Passionate about crafting graphic design, motion graphics, and UI/UX 💻. Interested in ideas surrounding arts, architecture, fashion, music and culture 🧑‍🎨.
            </p>
            <div class="flex justify-center gap-3">
                <a href="#" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-5 py-1.5 rounded-full text-sm font-medium transition-colors">Resume</a>
                <a href="#" class="bg-gray-100 hover:bg-gray-200 text-gray-800 px-5 py-1.5 rounded-full text-sm font-medium transition-colors">Contacts</a>
            </div>
        </div>

        <div class="flex-grow flex items-center justify-center w-full max-w-6xl mx-auto relative pb-20 pt-16 sm:pt-24">
            
            <div class="flex justify-center items-center relative w-full px-4">
                
                <a href="#link1" class="card block w-24 h-24 sm:w-48 sm:h-48 bg-[#e83b4b] z-[70] transform rotate-[-6deg] translate-y-4"></a>
                
                <a href="#link2" class="card block w-24 h-24 sm:w-48 sm:h-48 bg-[#f5cb43] z-[60] -ml-8 sm:-ml-16 transform rotate-[2deg] -translate-y-2"></a>
                
                <a href="#link3" class="card block w-24 h-24 sm:w-48 sm:h-48 bg-[#8bd1c9] z-[50] -ml-8 sm:-ml-16 transform rotate-[-3deg] translate-y-6"></a>
                
                <a href="#link4" class="card block w-24 h-24 sm:w-48 sm:h-48 bg-[#0f2bb9] z-[40] -ml-8 sm:-ml-16 transform rotate-[0deg] -translate-y-6"></a>
                
                <a href="#link5" class="card block w-24 h-24 sm:w-48 sm:h-48 bg-[#909090] z-[30] -ml-8 sm:-ml-16 transform rotate-[1deg] translate-y-2"></a>
                
                <a href="#link6" class="card block w-24 h-24 sm:w-48 sm:h-48 bg-[#2c2244] z-[20] -ml-8 sm:-ml-16 transform rotate-[4deg] -translate-y-3"></a>
                
                <a href="#link7" class="card block w-24 h-24 sm:w-48 sm:h-48 bg-[#214156] z-[10] -ml-8 sm:-ml-16 transform rotate-[-5deg] translate-y-5"></a>

            </div>
        </div>
    </div>

</body>
</html>
